# application.properties

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.maximum-pool-size=5
spring.jpa.hibernate.ddl-auto=update

spring.security.jwt.secret=${JWT_SECRET}
spring.security.jwt.access-token.expiration=${JWT_ACCESS_TOKEN_EXPIRATION}
spring.security.jwt.refresh-token.expiration=${JWT_REFRESH_TOKEN_EXPIRATION}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
mail.from=${MAIL_FROM:trackifi7@gmail.com}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.protocol=smtp

logging.level.org.springframework=INFO
logging.level.com.finance.tracker=DEBUG

frontend.url=${FRONTEND_URL}
auth.auto-verify=false
